on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

name: R CMD Check

permissions: read-all

jobs:
  check-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libbz2-dev liblzma-dev zlib1g-dev libglpk-dev pandoc texlive-latex-recommended texlive-latex-extra ghostscript qpdf

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            cran::BiocManager
          upgrade: 'TRUE'
          cache: true


      - name: Run checks
        uses: r-lib/actions/check-r-package@v2
        with:
          # --as-cran (on by default here) enables the gs+qpdf vignette size
          # check, so the built PDFs must already be compacted or the check
          # emits a WARNING -- which error-on: "warning" turns into a failure.
          # Compacting at build time is the fix; gs_quality "ebook" matches
          # what the check itself recommends.
          build_args: 'c("--no-manual", "--compact-vignettes=both")'
        env:
          GS_QUALITY: ebook