on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

name: R Bioc Check

permissions: read-all

jobs:
  check-package:
    runs-on: ubuntu-latest
    # bioc-check-action posts/updates a PR comment by default, which needs
    # write access; the workflow-level "read-all" alone is not enough.
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libbz2-dev liblzma-dev zlib1g-dev libglpk-dev libgit2-dev pandoc texlive-latex-recommended texlive-latex-extra

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            cran::BiocManager
            cran::gert
          upgrade: 'TRUE'
          cache: true

      - name: Run BiocCheck
        uses: insightsengineering/bioc-check-action@v1
        with:
          # NOTE: despite the name, "allow-failure: true" is what makes this
          # action actually fail the job when BiocCheck reports ERRORs.
          # (See https://github.com/insightsengineering/bioc-check-action)
          allow-failure: true